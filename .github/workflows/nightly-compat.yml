# Same verify gate as CI, but against tomorrow's SDK (latest + canary
# dist-tags). Red semantics: docs/COMPATIBILITY.md.
#
# Security: the compat job installs and EXECUTES unpinned upstream SDK code, so
# it runs with a read-only token and no persisted git credentials. Issue filing
# happens in a separate job that never executes that code.
name: Nightly SDK compat
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  compat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        channel: [latest, canary]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/verify
        with:
          sdk-channel: ${{ matrix.channel }}

  report:
    runs-on: ubuntu-latest
    needs: compat
    if: always() && needs.compat.result == 'failure'
    permissions:
      issues: write
      actions: read
    steps:
      - name: File or update issue per failed channel
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh label create compat --description "Paperclip core compatibility" --color D93F0B -R "$REPO" 2>/dev/null || true
          FAILED_JOBS=$(gh api "repos/$REPO/actions/runs/$GITHUB_RUN_ID/jobs" --paginate --jq '.jobs[] | select(.conclusion == "failure") | .name')
          for channel in latest canary; do
            echo "$FAILED_JOBS" | grep -q "compat ($channel)" || continue
            TITLE="Nightly compat broken vs SDK @$channel"
            BODY="Run: $GITHUB_SERVER_URL/$REPO/actions/runs/$GITHUB_RUN_ID"
            EXISTING=$(gh issue list -R "$REPO" --state open --label compat --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" -R "$REPO" --body "Still failing. $BODY"
            else
              gh issue create -R "$REPO" --title "$TITLE" --body "$BODY" --label compat
            fi
          done
