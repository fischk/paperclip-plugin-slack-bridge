# npm OIDC trusted publishing, two channels via deployment environments
# (mirrors Paperclip core's release model):
#   push to main -> canary job, environment npm-canary, dist-tag `canary`
#   tag v*       -> stable job, environment npm-stable, dist-tag `latest`
# Both jobs live in this one workflow because npm binds the trusted publisher
# to a single workflow file; leave the publisher's environment field UNSET on
# npmjs.com (two environments publish through it). Protection rules (e.g. a
# required reviewer on npm-stable) are configured in repo Settings ->
# Environments. First-ever publish was manual (see docs/RELEASING.md).
name: Publish to npm
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  canary:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm-canary
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Publish canary (date-based, matches Paperclip core convention)
        run: |
          NAME=$(node -p "require('./package.json').name")
          # YYYY.MDD (UTC month unpadded, day zero-padded), e.g. 2026.702 for Jul 2
          BASE_DATE="$(date -u +%Y).$(date -u +%-m)$(date -u +%d)"
          VERSIONS=$(npm view "$NAME" versions --json 2>/dev/null | jq 'if type=="array" then . else [.] end' || echo '[]')
          # P = stables already published today (canary previews the NEXT patch slot)
          P=$(echo "$VERSIONS" | jq --arg b "$BASE_DATE." '[ .[] | select(startswith($b)) | select(contains("-") | not) ] | length')
          BASE="$BASE_DATE.$P"
          N=$(echo "$VERSIONS" | jq --arg b "$BASE-canary." '[ .[] | select(startswith($b)) ] | length')
          CANARY="$BASE-canary.$N"
          echo "publishing $CANARY"
          npm version "$CANARY" --no-git-tag-version
          npm publish --provenance --access public --tag canary

  stable:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm-stable
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Publish stable (fail closed on registry errors)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          set +e
          VIEW_OUTPUT=$(npm view "${NAME}@${VERSION}" version 2>&1)
          VIEW_STATUS=$?
          set -e
          if [ $VIEW_STATUS -eq 0 ] && [ -n "$VIEW_OUTPUT" ]; then
            echo "Version ${VERSION} already published, skipping."
          elif echo "$VIEW_OUTPUT" | grep -q "E404"; then
            npm publish --provenance --access public
          else
            echo "npm view failed for a non-404 reason; refusing to publish blind:"
            echo "$VIEW_OUTPUT"
            exit 1
          fi
