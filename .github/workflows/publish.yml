# npm OIDC trusted publishing, two channels via deployment environments
# (mirrors Paperclip core's release model):
#   push to main -> canary job, environment npm-canary, dist-tag `canary`
#   tag v*       -> stable job, environment npm-stable, dist-tag `latest`
# Both jobs live in this one workflow because npm binds the trusted publisher
# to a single workflow file; leave the publisher's environment field UNSET on
# npmjs.com (two environments publish through it). Protection rules (e.g. a
# required reviewer on npm-stable) are configured in repo Settings ->
# Environments. First-ever publish was manual (see docs/RELEASING.md).
name: Publish to npm
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  canary:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm-canary
    # Serialize canaries so concurrent merges can't compute the same N. A burst
    # of merges may coalesce (GitHub keeps one pending run per group) — fine,
    # the newest canary contains all merged changes. Stables have their own
    # group so a pending release can never be evicted by canary traffic.
    concurrency:
      group: publish-canary
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Publish canary (<next-patch>-canary.<date>.<run-of-day>)
        run: |
          NAME=$(node -p "require('./package.json').name")
          LATEST=$(npm view "$NAME" dist-tags.latest 2>/dev/null)
          if [ -z "$LATEST" ]; then
            echo "could not resolve dist-tag latest; refusing to compute canary base blind"
            exit 1
          fi
          IFS=. read -r MA MI PA <<< "$LATEST"
          NEXT="$MA.$MI.$((PA+1))"
          DATE="$(date -u +%Y%m%d)"
          VERSIONS=$(npm view "$NAME" versions --json 2>/dev/null | jq 'if type=="array" then . else [.] end' || echo '[]')
          N=$(echo "$VERSIONS" | jq --arg b "$NEXT-canary.$DATE." '[ .[] | select(startswith($b)) ] | length')
          CANARY="$NEXT-canary.$DATE.$N"
          echo "publishing $CANARY (base: latest=$LATEST)"
          npm version "$CANARY" --no-git-tag-version
          npm publish --provenance --access public --tag canary

  stable:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm-stable
    concurrency:
      group: publish-stable
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Assert release tag matches package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}"
            exit 1
          fi
      - name: Publish stable (fail closed on registry errors)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          set +e
          VIEW_OUTPUT=$(npm view "${NAME}@${VERSION}" version 2>&1)
          VIEW_STATUS=$?
          set -e
          if [ $VIEW_STATUS -eq 0 ] && [ -n "$VIEW_OUTPUT" ]; then
            echo "Version ${VERSION} already published, skipping."
          elif echo "$VIEW_OUTPUT" | grep -q "E404"; then
            npm publish --provenance --access public
          else
            echo "npm view failed for a non-404 reason; refusing to publish blind:"
            echo "$VIEW_OUTPUT"
            exit 1
          fi
